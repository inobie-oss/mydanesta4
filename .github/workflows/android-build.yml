name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Create or Verify Android Asset Folders
        run: |
          mkdir -p dist
          npx cap sync

      - name: Add Android Platform (if missing)
        run: |
          # Check if android folder exists, if not initialize it
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Assets
        run: npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Locate and Rename APK
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/debug/app-debug.apk build-output/Dranfrean-Animator-v1.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dranfrean-Android-APK
          path: build-output/Dranfrean-Animator-v1.apk
          retention-days: 7
