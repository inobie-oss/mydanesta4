<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Glowing effect defs -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Node Gradient Cyan -->
    <radialGradient id="node-cyan" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="40%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </radialGradient>
    
    <!-- Node Gradient Indigo -->
    <radialGradient id="node-indigo" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c7d2fe" />
      <stop offset="40%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </radialGradient>

    <!-- Bone Connection Gradient -->
    <linearGradient id="bone-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="bone-grad-2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="60%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>

  <!-- Background App Background Rounded Rect for launcher -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Subtle inner sleek dark border -->
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#1e293b" stroke-width="4" opacity="0.4" />
  
  <!-- Abstract Grid Lines in background for Animation Editor theme -->
  <g stroke="#1e293b" stroke-width="2" opacity="0.15">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Connection Line 1 (Root to Center Bone) with capsules representing stylized puppet parts -->
  <g opacity="0.95">
    <!-- Outer Rig Skeleton Lines -->
    <path d="M 160,352 L 256,224 L 352,320" fill="none" stroke="#000" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="blur(3px)" />
    <path d="M 256,224 L 256,128" fill="none" stroke="#000" stroke-width="14" stroke-linecap="round" opacity="0.3" filter="blur(3px)" />

    <!-- Stylized Bone Linkages (Rig limbs) -->
    <!-- Bone segment 1 -->
    <path d="M 160,352 L 256,224" fill="none" stroke="url(#bone-grad-1)" stroke-width="12" stroke-linecap="round" filter="url(#glow-indigo)" />
    <!-- Bone segment 2 -->
    <path d="M 256,224 L 352,320" fill="none" stroke="url(#bone-grad-2)" stroke-width="12" stroke-linecap="round" filter="url(#glow-cyan)" />
    <!-- Bone segment 3 (Header / spine bone) -->
    <path d="M 256,224 L 256,128" fill="none" stroke="url(#bone-grad-1)" stroke-width="10" stroke-linecap="round" stroke-dasharray="4,8,8,8" />
  </g>

  <!-- Skeleton Joints / Control Handles -->
  <!-- Left Foot / Joint 1 -->
  <circle cx="160" cy="352" r="22" fill="url(#node-indigo)" filter="url(#glow-indigo)" />
  <circle cx="160" cy="352" r="10" fill="#ffffff" />

  <!-- Right Foot / Joint 2 -->
  <circle cx="352" cy="320" r="22" fill="url(#node-cyan)" filter="url(#glow-cyan)" />
  <circle cx="352" cy="320" r="10" fill="#ffffff" />

  <!-- Center Pelvis / Joint 3 -->
  <circle cx="256" cy="224" r="28" fill="url(#node-indigo)" filter="url(#glow-indigo)" />
  <circle cx="256" cy="224" r="12" fill="#ffffff" />
  
  <!-- Head Joint / Joint 4 -->
  <circle cx="256" cy="128" r="20" fill="url(#node-cyan)" filter="url(#glow-cyan)" />
  <circle cx="256" cy="128" r="8" fill="#ffffff" />

  <!-- Cute Stylized Puppet Kinematics Arc -->
  <path d="M 310,260 A 80,80 0 0,1 364,300" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-dasharray="4,4" opacity="0.8" />
  <path d="M 364,300 L 358,292 M 364,300 L 354,302" stroke="#22d3ee" stroke-width="2" />
  
  <path d="M 200,300 A 70,70 0 0,1 245,240" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="4,4" opacity="0.8" />
  <path d="M 245,240 L 237,243 M 245,240 L 244,248" stroke="#818cf8" stroke-width="2" />
</svg>
